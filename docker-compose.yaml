services:
  http-server-projeto-korp:
    image: http-server-projeto-korp
    container_name: http-server-projeto-korp
    build:
      context: ./app
      dockerfile: dockerfile
    environment:
      - PORT=8080
    expose:
      - "8080"
    networks:
      - korp-network

  nginx:
    image: nginx:alpine
    container_name: korp-nginx
    depends_on:
      - http-server-projeto-korp
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - korp-network

  prometheus:
    image: prom/prometheus:latest
    container_name: korp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - korp-network

  grafana:
    image: grafana/grafana:13.0.3-slim
    container_name: korp-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=korp
      - GF_SECURITY_ADMIN_PASSWORD=korp
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - korp-network

networks:
  korp-network:
    name: korp-network

volumes:
  grafana-data:
    name: grafana-data
  prometheus-data:
    name: prometheus-data
